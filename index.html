<!DOCTYPE html>
<html>
<head>
<title>Exam Results</title>

<style>
body{
  font-family: Arial;
  background:#f0f2f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  padding:30px;
  width:320px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
}

input, select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#2b2e4a;
  color:white;
  border:none;
  border-radius:8px;
}

#error{
  color:red;
  font-size:14px;
}

#resultBox{
  display:none;
}

/* 🔄 Loading spinner */
.loader{
  border:6px solid #f3f3f3;
  border-top:6px solid #2b2e4a;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
  margin:20px auto;
}

@keyframes spin{
  0%{ transform:rotate(0deg); }
  100%{ transform:rotate(360deg); }
}

img{
  max-width:100%;
  max-height:250px;
  object-fit:contain;
  border-radius:10px;
  display:none;
}

.footer{
  margin-top:15px;
  font-size:12px;
  color:gray;
}
</style>

</head>

<body>

<div class="container" id="formBox">

<h1>Exam Result</h1>

<input type="text" id="hall" placeholder="Hallticket number">

<select id="exam">
  <option disabled selected>Choose Exam</option>
  <option>Regular</option>
  <option>Supply</option>
</select>

<select id="view">
  <option disabled selected>Choose view</option>
  <option>All semesters</option>
  <option>Single semester</option>
</select>

<select id="sem">
  <option disabled selected>Semester</option>
  <option>1-1</option>
  <option>1-2</option>
</select>

<div id="error"></div>

<button onclick="checkResult()">Submit</button>

<div class="footer">viet.edu.in</div>

</div>

<!-- RESULT BOX -->
<div class="container" id="resultBox">

  <!-- 🔄 loading -->
  <div id="loader" class="loader"></div>

  <!-- 🖼 image -->
  <img id="funImg" src="">

</div>

<script>
function checkResult(){

  let hall = document.getElementById("hall").value;
  let exam = document.getElementById("exam").value;
  let view = document.getElementById("view").value;
  let sem = document.getElementById("sem").value;
  let error = document.getElementById("error");

  if(hall === "" || exam === "Choose Exam" || view === "Choose view" || sem === "Semester"){
    error.innerText = "Fill all details";
    return;
  }

  error.innerText = "";

  document.getElementById("formBox").style.display = "none";
  document.getElementById("resultBox").style.display = "block";

  setTimeout(()=>{

    // hide loader
    document.getElementById("loader").style.display = "none";

    // show image
    let img = document.getElementById("funImg");
    img.src = "https://img.sanishtech.com/u/ea90755e3d9c37e44aedc5be1e432694.jpg";
    img.style.display = "block";

  }, 2000);
}
</script>

</body>
</html>
